upstream event_hub_api {
  server api:8000;
}

upstream event_hub_web {
  server web:3000;
}

server {
  listen 80;
  server_name localhost;  # в production: event-hub.example.com

  client_max_body_size 10M;

  # API
  location ~ ^/(auth|events|notifications|health|docs|redoc|openapi\.json) {
    proxy_pass http://event_hub_api;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Nuxt
  location / {
    proxy_pass http://event_hub_web;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://event_hub_api/health;
    access_log off;
  }
}