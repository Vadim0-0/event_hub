name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  SECRET_KEY: test-secret-key-for-tests-only
  POSTGRES_USER: auth_user
  POSTGRES_PASSWORD: auth_password
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: event_hub_test

jobs:
  # ── Job 1: pytest ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: event_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt
      
      - name: Create test env file
        run: cp tests/.env.test.example tests/.env.test

      - name: Run tests
        run: pytest -v

  # ── Job 2: Alembic migrations ─────────────────────────────
  migration: 
    runs-on: ubuntu-latest
    
    services: 
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: event_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    defaults:
      run:
        working-directory: api
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head