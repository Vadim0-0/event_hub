version: 2
enable-beta-ecosystems: true

updates:
  # Python
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(pip)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"

  # Dockerfile
  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"

  # Images in docker-compose.yml
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(compose)"
